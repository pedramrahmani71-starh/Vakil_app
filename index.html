<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>وکیل علی‌زاده</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-bottom: 90px;
            padding-top: 0;
        }

        #app {
            max-width: 430px;
            width: 100%;
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            position: relative;
        }

        /* ===== نوار بالایی (Header) ===== */
        #app-header {
            position: sticky;
            top: 0;
            z-index: 150;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.03);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6C63FF, #4A3DBF);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(108, 99, 255, 0.25);
        }

        .header-brand {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.3px;
        }

        .header-brand span {
            font-weight: 400;
            color: #8A8A9A;
            font-size: 12px;
        }

        .header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-btn {
            background: none;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #4A3DBF;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(108, 99, 255, 0.06);
        }

        .header-btn:active {
            transform: scale(0.92);
            background: rgba(108, 99, 255, 0.15);
        }

        /* ===== صفحات ===== */
        .page {
            display: none;
            padding: 20px 20px 24px;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== منوی پایین گرد (همون قبلی) ===== */
        #bottom-nav {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.02);
            z-index: 200;
            height: 68px;
            transition: all 0.3s ease;
        }

        .nav-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            padding: 4px 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            opacity: 0.5;
            min-width: 48px;
            border-radius: 16px;
            flex: 1;
        }

        .nav-item.active {
            opacity: 1;
        }

        .nav-item.active .nav-icon-wrapper {
            background: linear-gradient(135deg, #6C63FF, #4A3DBF);
            color: #fff;
            transform: scale(1);
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.35);
        }

        .nav-icon-wrapper {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(0.92);
            background: transparent;
            color: #8A8A9A;
            font-size: 20px;
        }

        .nav-item:active .nav-icon-wrapper {
            transform: scale(0.85);
        }

        .nav-label {
            font-size: 9px;
            font-weight: 500;
            color: #8A8A9A;
            transition: all 0.2s;
            letter-spacing: 0.2px;
            margin-top: 0px;
        }

        .nav-item.active .nav-label {
            color: #4A3DBF;
            font-weight: 600;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            width: 5px;
            height: 5px;
            background: #6C63FF;
            border-radius: 50%;
            opacity: 0.6;
        }

        /* ===== صفحات خالی ===== */
        .page-placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 16px;
        }

        .page-placeholder i {
            font-size: 48px;
            color: #ddd;
            margin-bottom: 16px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="app">

        <!-- ===== نوار بالایی ===== -->
        <header id="app-header">
            <div class="header-left">
                <div class="header-logo">⚖️</div>
                <div class="header-brand">
                    وکیل علی‌زاده
                    <span>| وکالت</span>
                </div>
            </div>
            <div class="header-center" id="page-title">خانه</div>
            <div class="header-right">
                <button class="header-btn" onclick="alert('منوی تنظیمات')">
                    <i class="fas fa-ellipsis-vertical"></i>
                </button>
            </div>
        </header>

        <!-- ===== صفحات ===== -->

        <!-- صفحه خانه -->
        <div id="page-home" class="page active">
            <div class="page-placeholder">
                <i class="fas fa-home"></i>
                <p>صفحه‌ی خانه</p>
                <p style="font-size:14px; color:#ccc;">به‌زودی تکمیل می‌شود</p>
            </div>
        </div>

        <!-- صفحه نوبت‌دهی -->
        <div id="page-appointments" class="page">
            <div class="page-placeholder">
                <i class="fas fa-calendar-check"></i>
                <p>نوبت‌دهی</p>
                <p style="font-size:14px; color:#ccc;">به‌زودی تکمیل می‌شود</p>
            </div>
        </div>

        <!-- صفحه شبکه‌های اجتماعی -->
        <div id="page-social" class="page">
            <div class="page-placeholder">
                <i class="fas fa-share-alt"></i>
                <p>شبکه‌های اجتماعی</p>
                <p style="font-size:14px; color:#ccc;">به‌زودی تکمیل می‌شود</p>
            </div>
        </div>

        <!-- صفحه تماس و لوکیشن -->
        <div id="page-contact" class="page">
            <div class="page-placeholder">
                <i class="fas fa-map-pin"></i>
                <p>تماس و لوکیشن</p>
                <p style="font-size:14px; color:#ccc;">به‌زودی تکمیل می‌شود</p>
            </div>
        </div>

        <!-- صفحه حساب کاربری -->
        <div id="page-account" class="page">
            <div class="page-placeholder">
                <i class="fas fa-user"></i>
                <p>حساب کاربری</p>
                <p style="font-size:14px; color:#ccc;">به‌زودی تکمیل می‌شود</p>
            </div>
        </div>

    </div>

    <!-- ===== منوی پایین ===== -->
    <nav id="bottom-nav">
        <button class="nav-item active" data-page="page-home" data-title="خانه">
            <span class="nav-icon-wrapper">
                <i class="fas fa-house"></i>
            </span>
            <span class="nav-label">خانه</span>
        </button>
        <button class="nav-item" data-page="page-appointments" data-title="نوبت‌دهی">
            <span class="nav-icon-wrapper">
                <i class="fas fa-calendar-day"></i>
            </span>
            <span class="nav-label">نوبت</span>
        </button>
        <button class="nav-item" data-page="page-social" data-title="شبکه‌های اجتماعی">
            <span class="nav-icon-wrapper">
                <i class="fas fa-share-nodes"></i>
            </span>
            <span class="nav-label">شبکه‌ها</span>
        </button>
        <button class="nav-item" data-page="page-contact" data-title="تماس و لوکیشن">
            <span class="nav-icon-wrapper">
                <i class="fas fa-phone"></i>
            </span>
            <span class="nav-label">تماس</span>
        </button>
        <button class="nav-item" data-page="page-account" data-title="حساب کاربری">
            <span class="nav-icon-wrapper">
                <i class="fas fa-user"></i>
            </span>
            <span class="nav-label">حساب</span>
        </button>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const navItems = document.querySelectorAll('.nav-item');
            const pages = document.querySelectorAll('.page');
            const pageTitle = document.getElementById('page-title');

            navItems.forEach(item => {
                item.addEventListener('click', function() {
                    // تغییر منو
                    navItems.forEach(n => n.classList.remove('active'));
                    this.classList.add('active');

                    // تغییر صفحه
                    pages.forEach(p => p.classList.remove('active'));
                    const pageId = this.dataset.page;
                    document.getElementById(pageId).classList.add('active');

                    // تغییر عنوان نوار بالایی
                    const title = this.dataset.title;
                    if (title) {
                        pageTitle.textContent = title;
                    }
                });
            });
        });
    </script>

</body>
</html>
