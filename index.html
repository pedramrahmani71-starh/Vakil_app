<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>وکیل علی‌زاده</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        #app {
            max-width: 430px;
            width: 100%;
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
        }

        /* ===== صفحات ===== */
        .page {
            display: none;
            padding: 24px 20px;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== منوی پایین ===== */
        #bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 430px;
            margin: 0 auto;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            border-top: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
            z-index: 200;
        }

        .nav-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 12px;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0.5;
            position: relative;
        }

        .nav-item.active {
            opacity: 1;
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            top: -1px;
            width: 20px;
            height: 3px;
            background: #6C63FF;
            border-radius: 0 0 10px 10px;
        }

        .nav-icon {
            font-size: 22px;
            line-height: 1;
        }

        .nav-label {
            font-size: 10px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .nav-item.active .nav-label {
            color: #6C63FF;
        }

        /* ===== صفحات خالی (فقط برای نمایش) ===== */
        .page-placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 16px;
        }

        .page-placeholder i {
            font-size: 48px;
            color: #ddd;
            margin-bottom: 16px;
            display: block;
        }
    </style>
</head>
<body>

    <div id="app">

        <!-- صفحه خانه -->
        <div id="page-home" class="page active">
            <div class="page-placeholder">
                <i class="fas fa-home"></i>
                <p>صفحه‌ی خانه</p>
                <p style="font-size:14px; color:#ccc;">به‌زودی تکمیل می‌شود</p>
            </div>
        </div>

        <!-- صفحه نوبت‌دهی -->
        <div id="page-appointments" class="page">
            <div class="page-placeholder">
                <i class="fas fa-calendar-check"></i>
                <p>نوبت‌دهی</p>
                <p style="font-size:14px; color:#ccc;">به‌زودی تکمیل می‌شود</p>
            </div>
        </div>

        <!-- صفحه شبکه‌های اجتماعی -->
        <div id="page-social" class="page">
            <div class="page-placeholder">
                <i class="fas fa-share-alt"></i>
                <p>شبکه‌های اجتماعی</p>
                <p style="font-size:14px; color:#ccc;">به‌زودی تکمیل می‌شود</p>
            </div>
        </div>

        <!-- صفحه تماس و لوکیشن -->
        <div id="page-contact" class="page">
            <div class="page-placeholder">
                <i class="fas fa-map-pin"></i>
                <p>تماس و لوکیشن</p>
                <p style="font-size:14px; color:#ccc;">به‌زودی تکمیل می‌شود</p>
            </div>
        </div>

        <!-- صفحه حساب کاربری -->
        <div id="page-account" class="page">
            <div class="page-placeholder">
                <i class="fas fa-user"></i>
                <p>حساب کاربری</p>
                <p style="font-size:14px; color:#ccc;">به‌زودی تکمیل می‌شود</p>
            </div>
        </div>

    </div>

    <!-- منوی پایین -->
    <nav id="bottom-nav">
        <button class="nav-item active" data-page="page-home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">خانه</span>
        </button>
        <button class="nav-item" data-page="page-appointments">
            <span class="nav-icon">📅</span>
            <span class="nav-label">نوبت</span>
        </button>
        <button class="nav-item" data-page="page-social">
            <span class="nav-icon">🌐</span>
            <span class="nav-label">شبکه‌ها</span>
        </button>
        <button class="nav-item" data-page="page-contact">
            <span class="nav-icon">📞</span>
            <span class="nav-label">تماس</span>
        </button>
        <button class="nav-item" data-page="page-account">
            <span class="nav-icon">👤</span>
            <span class="nav-label">حساب</span>
        </button>
    </nav>

    <script>
        // ===== تغییر صفحه با کلیک روی منو =====
        document.addEventListener('DOMContentLoaded', function() {
            const navItems = document.querySelectorAll('.nav-item');
            const pages = document.querySelectorAll('.page');

            navItems.forEach(item => {
                item.addEventListener('click', function() {
                    // حذف active از همه منوها
                    navItems.forEach(n => n.classList.remove('active'));
                    // اضافه active به منوی کلیک شده
                    this.classList.add('active');

                    // مخفی کردن همه صفحات
                    pages.forEach(p => p.classList.remove('active'));

                    // نمایش صفحه مربوطه
                    const pageId = this.dataset.page;
                    document.getElementById(pageId).classList.add('active');
                });
            });
        });
    </script>

</body>
</html>
